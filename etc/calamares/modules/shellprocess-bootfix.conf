---

dontChroot: false
timeout: 300
i18n:
    name: "Applying hardware-specific boot fixes"

# This step is best-effort polish, not a critical install step: if a job in
# this exec sequence returns failure, Calamares skips every remaining job
# (grubcfg, bootloader, shellprocess, preservefiles, umount), which would
# leave partitions mounted and no bootloader installed. The leading "-" and
# the trailing "exit 0" both exist to guarantee this can never happen here,
# even if something inside behaves unexpectedly on a user's hardware.
script:
    - command: |
        -{
            # mkinitcpio's autodetect/kms hooks can't see real GPU hardware
            # while running inside the install chroot, so nvidia's early-KMS
            # modules never make it into the initramfs and nouveau is free to
            # race the nvidia driver for the display at boot. Only touch
            # nvidia/nouveau config if the user actually selected an nvidia
            # driver group.
            if pacman -Qq nvidia-open-dkms &>/dev/null || pacman -Qq nvidia-dkms &>/dev/null || pacman -Qq nvidia &>/dev/null; then
                mkdir -p /etc/modprobe.d
                if ! grep -rq '^blacklist nouveau' /etc/modprobe.d/ 2>/dev/null; then
                    printf 'blacklist nouveau\noptions nouveau modeset=0\n' > /etc/modprobe.d/blacklist-nouveau.conf
                fi
                if grep -q '^MODULES=(' /etc/mkinitcpio.conf 2>/dev/null && ! grep -q 'nvidia_drm' /etc/mkinitcpio.conf; then
                    sed -i 's/^MODULES=(/MODULES=(nvidia nvidia_modeset nvidia_drm nvidia_uvm /' /etc/mkinitcpio.conf
                fi
            fi

            # The live ISO's linux.preset is built for the archiso live-boot
            # environment. If it's still in that form on the installed
            # system, replace it with a normal preset before regenerating
            # images.
            for preset in /etc/mkinitcpio.d/*.preset; do
                [ -f "$preset" ] || continue
                if grep -q "PRESETS=('archiso')" "$preset" 2>/dev/null; then
                    kver=$(basename "$preset" .preset)
                    {
                        echo "ALL_kver=\"/boot/vmlinuz-${kver}\""
                        echo "PRESETS=('default')"
                        echo "default_image=\"/boot/initramfs-${kver}.img\""
                    } > "$preset"
                fi
            done

            mkinitcpio -P
        } > /var/log/calamares-bootfix.log 2>&1
        exit 0
      timeout: 300
