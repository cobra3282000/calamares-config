---

dontChroot: false 

backend: pacman

skip_if_no_internet: false
update_db: true
update_system: true

verbose: true

pacman:
    num_retries: 3
    disable_download_timeout: false
    needed_only: false

    - command: "pacman-key --init"
    timeout 300
    - command: "pacman-key --populate"
    timeout 300
    - command: "pacman -Syy"
    timeout 300

operations:
