showSupportUrl:         false
showKnownIssuesUrl:     false
showReleaseNotesUrl:    false
showDonateUrl:          false

requirements:
    requiredStorage:    15

    requiredRam:        1.0

    internetCheckUrl:   http://google.com

    check:
        - storage
        - ram
        - power
        - internet
        - root

    required:
        - storage
        - ram
        - root

geoip:
    style:    "none"
    url:      "https://geoip.kde.org/v1/ubiquity"  # extended XML format
    selector: "CountryCode"  # blank uses default, which is wrong
    welcomeMessage: |
    <h2>Welcome to AccretionOS</h2>
    
    <p><strong>Thank you for choosing AccretionOS!</strong></p>
    
    <p>AccretionOS is an Arch-based Linux distribution focused on performance, 
    simplicity, and user control. This installer will guide you through setting 
    up your new system.</p>
    
    <p>Before proceeding, please ensure:</p>
    <ul>
        <li>Your system meets the minimum requirements shown below</li>
        <li>You have backed up any important data</li>
        <li>Your device is connected to power</li>
        <li>You have a stable internet connection</li>
    </ul>
    
    <p>Ready to begin your AccretionOS journey? Click <strong>Next</strong> to continue.</p>
