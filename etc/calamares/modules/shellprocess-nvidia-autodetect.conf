---

dontChroot: false
timeout: 900
i18n:
    name: "Detecting NVIDIA hardware"

# NOTE: Calamares runs its own variable-expansion pass on every command
# string before handing it to the shell (KWordMacroExpander in
# CommandList.cpp), and it is NOT shell-quote-aware: any bare dollar-sign
# variable reference in the script text (even inside single quotes) gets
# treated as an unresolved Calamares macro and hard-fails the whole job
# with "Missing variables" BEFORE the shell ever runs. To avoid that, the
# actual script is base64-encoded here (base64's alphabet has no dollar
# sign) and decoded+executed at runtime, after Calamares' expansion pass
# is already done. See shellprocess-nvidia-autodetect.source.sh in this
# directory for the human-readable version of what this actually runs, and
# for the one-line command to regenerate this blob after editing that file.
#
# This step is best-effort polish, not a critical install step: if a job in
# this exec sequence returns failure, Calamares skips every remaining job
# (initcpiocfg, packages, bootloader, etc.), which would leave a broken
# install. The leading "-" and the payload's own trailing "exit 0" both
# exist to guarantee this can never happen here, even if something inside
# behaves unexpectedly on a user's hardware.
script:
    - command: "-echo  | base64 -d | bash"
      timeout: 900
