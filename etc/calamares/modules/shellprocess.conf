---

dontChroot: false

script:
    # Leading "-" tells Calamares to ignore this job's exit code. Without
    # it, a nonzero exit from postinstall.sh aborts the exec sequence and
    # skips every remaining job (shellprocess@bootfix, preservefiles,
    # umount), leaving partitions mounted and no bootloader installed.
    - command: "-/usr/local/bin/postinstall.sh"
